<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Articles | Boldly Balance</title>
    <meta name="description" content="Search articles on mindful living, productivity, and holistic wellness.">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="search.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <style>
        :root {
            --primary: #14b8a6;
            --primary-dark: #0d9488;
            --bg: #0f0f11;
            --bg-elevated: #18181b;
            --bg-card: #1c1c1f;
            --text: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.25rem;
            transition: opacity 0.2s;
        }
        
        .logo:hover {
            opacity: 0.8;
        }
        
        main {
            flex: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 2rem;
            width: 100%;
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text);
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        
        .search-wrapper {
            position: relative;
            margin-bottom: 2rem;
        }
        
        .search-input-large {
            width: 100%;
            padding: 1.25rem 1.5rem;
            padding-left: 3.5rem;
            background: var(--bg-card);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text);
            font-size: 1.125rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .search-input-large:focus {
            border-color: var(--primary);
        }
        
        .search-input-large::placeholder {
            color: var(--text-muted);
        }
        
        .search-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }
        
        .results-container {
            display: none;
        }
        
        .results-container.has-results {
            display: block;
        }
        
        .results-count {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        .results-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .result-item {
            display: block;
            padding: 1.25rem;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .result-item:hover {
            background: var(--bg-elevated);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }
        
        .result-category {
            display: inline-block;
            padding: 0.25rem 0.625rem;
            background: rgba(20, 184, 166, 0.15);
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.625rem;
        }
        
        .result-title {
            color: var(--text);
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }
        
        .result-excerpt {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .no-results {
            text-align: center;
            padding: 3rem 2rem;
        }
        
        .no-results-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        .no-results h2 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }
        
        .no-results p {
            color: var(--text-secondary);
        }
        
        .initial-state {
            text-align: center;
            padding: 2rem;
        }
        
        .initial-state p {
            color: var(--text-muted);
        }
        
        footer {
            padding: 1.5rem 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
        }
        
        footer p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin: 0;
        }
        
        @media (max-width: 640px) {
            main {
                padding: 2rem 1rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .search-input-large {
                font-size: 1rem;
                padding: 1rem 1.25rem;
                padding-left: 3rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">Boldly Balance</a>
        </nav>
    </header>

    <main>
        <h1>Search Articles</h1>
        <p class="subtitle">Find articles on mindful living, productivity, and holistic wellness</p>
        
        <div class="search-wrapper">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input 
                type="text" 
                id="search-input" 
                class="search-input-large" 
                placeholder="Type to search articles..."
                autocomplete="off"
            >
        </div>
        
        <div id="initial-state" class="initial-state">
            <p>Start typing to search through all articles</p>
        </div>
        
        <div id="results-container" class="results-container">
            <p id="results-count" class="results-count"></p>
            <div id="results-list" class="results-list"></div>
        </div>
        
        <div id="no-results" class="no-results" style="display: none;">
            <div class="no-results-icon">🔍</div>
            <h2>No articles found</h2>
            <p>Try different keywords or browse our <a href="/" style="color: var(--primary);">latest articles</a></p>
        </div>
    </main>

    <footer>
        <p>© 2026 Boldly Balance — Mindful living, conscious choices.</p>
    </footer>

    <script>
        const searchInput = document.getElementById('search-input');
        const initialState = document.getElementById('initial-state');
        const resultsContainer = document.getElementById('results-container');
        const resultsCount = document.getElementById('results-count');
        const resultsList = document.getElementById('results-list');
        const noResults = document.getElementById('no-results');
        
        let searchIndex = [];
        
        // Load search index
        fetch('search-index.json')
            .then(response => response.json())
            .then(data => {
                searchIndex = data;
            })
            .catch(error => {
                console.error('Failed to load search index:', error);
            });
        
        // Search function
        function performSearch(query) {
            if (!query.trim()) {
                initialState.style.display = 'block';
                resultsContainer.classList.remove('has-results');
                noResults.style.display = 'none';
                return;
            }
            
            const lowerQuery = query.toLowerCase();
            const results = searchIndex.filter(item => {
                const title = (item.title || '').toLowerCase();
                const excerpt = (item.excerpt || '').toLowerCase();
                const category = (item.category || '').toLowerCase();
                const tags = (item.tags || []).join(' ').toLowerCase();
                return title.includes(lowerQuery) || 
                       excerpt.includes(lowerQuery) || 
                       category.includes(lowerQuery) ||
                       tags.includes(lowerQuery);
            });
            
            displayResults(results, query);
        }
        
        function displayResults(results, query) {
            if (results.length === 0) {
                initialState.style.display = 'none';
                resultsContainer.classList.remove('has-results');
                noResults.style.display = 'block';
                return;
            }
            
            initialState.style.display = 'none';
            noResults.style.display = 'none';
            resultsContainer.classList.add('has-results');
            
            const countText = results.length === 1 
                ? '1 article found' 
                : results.length + ' articles found';
            resultsCount.textContent = countText;
            
            resultsList.innerHTML = results.map(item => {
                const url = item.url || 'posts/' + item.slug + '.html';
                return '<a href="' + url + '" class="result-item">' +
                    '<span class="result-category">' + (item.category || 'Article') + '</span>' +
                    '<h3 class="result-title">' + highlightQuery(item.title, query) + '</h3>' +
                    '<p class="result-excerpt">' + (item.excerpt || item.title) + '</p>' +
                '</a>';
            }).join('');
        }
        
        function highlightQuery(text, query) {
            if (!query.trim()) return text;
            const regex = new RegExp('(' + escapeRegex(query) + ')', 'gi');
            return text.replace(regex, '<mark style="background: rgba(20, 184, 166, 0.3); color: inherit; padding: 0 2px; border-radius: 2px;">$1</mark>');
        }
        
        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
        
        // Event listener
        let debounceTimer;
        searchInput.addEventListener('input', function(e) {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(function() {
                performSearch(e.target.value);
            }, 150);
        });
        
        // Check for query parameter on load
        const urlParams = new URLSearchParams(window.location.search);
        const q = urlParams.get('q');
        if (q) {
            searchInput.value = q;
            performSearch(q);
        }
    </script>
</body>
</html>
