<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food | Boldly Balance</title>
    <meta name="description" content="Fuel your body and mind with intentional nutrition. Simple, sustainable eating for high performance.">
    <link rel="canonical" href="https://blog.boldlybalance.life/category/food.html">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
</head>
<body>
    <header id="header">
        <nav>
            <a href="/" class="logo">Boldly Balance</a>
            <div class="nav-links">
                <div class="dropdown">
                    <a href="/" class="nav-link">Topics ▾</a>
                    <div class="dropdown-content">
                        <a href="fitness.html">Fitness</a><a href="food.html">Food</a><a href="sleep.html">Sleep</a>
                        <a href="mind.html">Mind</a><a href="wellness.html">Wellness</a><a href="lifestyle.html">Lifestyle</a>
                        <a href="technology.html">Technology</a><a href="recovery.html">Recovery</a><a href="finance.html">Finance</a>
                        <a href="travel.html">Travel</a><a href="home-decor.html">Home Decor</a><a href="mindset.html">Mindset</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <section class="hero" style="padding-top: calc(72px + 6rem);">
        <div class="container" style="text-align: center;">
            <h1>Food</h1>
            <p style="max-width: 600px; margin: 1.5rem auto;">Fuel your body and mind with intentional nutrition. Simple, sustainable eating for high performance.</p>
        </div>
    </section>

    <section class="posts-section">
        <div class="post-grid" id="category-posts"></div>
    </section>

    <footer><p>© 2026 Boldly Balance.</p></footer>

    <script>
        document.getElementById('header') && window.addEventListener('scroll', () => {
            document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
        });
        
        fetch('../posts.json')
            .then(r => r.json())
            .then(posts => {
                const filtered = posts.filter(p => p.category.toLowerCase() === 'food');
                document.getElementById('category-posts').innerHTML = filtered.map(p => `
                    <a href="../posts/${p.slug}.html" class="post-card">
                        <div class="post-card-image"><img src="https://images.unsplash.com/${p.image}?w=600&q=80" alt="" loading="lazy"></div>
                        <div class="post-card-content">
                            <span class="tag">${p.category}</span>
                            <h3>${p.title}</h3>
                            <p>${p.excerpt}</p>
                            <span class="read-more">Read article</span>
                        </div>
                    </a>
                `).join('') || '<p style="text-align:center;">No posts yet.</p>';
            });
    </script>
</body>
</html>
