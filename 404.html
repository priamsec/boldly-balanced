<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Boldly Balance</title>
    <meta name="description" content="The page you're looking for doesn't exist. Explore our articles on mindful living, productivity, and holistic wellness.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <style>
        :root {
            --primary: #14b8a6;
            --primary-dark: #0d9488;
            --bg: #0f0f11;
            --bg-elevated: #18181b;
            --bg-card: #1c1c1f;
            --text: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        nav {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .logo {
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.25rem;
            transition: opacity 0.2s;
        }
        
        .logo:hover {
            opacity: 0.8;
        }
        
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        
        .error-content {
            max-width: 500px;
        }
        
        .error-code {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, var(--primary) 0%, #2dd4bf 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }
        
        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text);
        }
        
        p {
            color: var(--text-secondary);
            font-size: 1.125rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        
        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--primary);
            color: var(--bg);
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn-secondary:hover {
            background: var(--bg-elevated);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .search-form {
            margin-top: 2.5rem;
            padding-top: 2.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        .search-form p {
            font-size: 0.875rem;
            margin-bottom: 1rem;
            color: var(--text-muted);
        }
        
        .search-box {
            display: flex;
            max-width: 400px;
            margin: 0 auto;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        
        .search-box:focus-within {
            border-color: var(--primary);
        }
        
        .search-box input {
            flex: 1;
            padding: 0.875rem 1rem;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
        }
        
        .search-box input::placeholder {
            color: var(--text-muted);
        }
        
        .search-box button {
            padding: 0.875rem 1.25rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .search-box button:hover {
            color: var(--primary);
        }
        
        footer {
            padding: 1.5rem 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
        }
        
        footer p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin: 0;
        }
        
        @media (max-width: 640px) {
            .error-code {
                margin-bottom: 0.5rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            p {
                font-size: 1rem;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">Boldly Balance</a>
        </nav>
    </header>

    <main>
        <div class="error-content">
            <div class="error-code">404</div>
            <h1>Page Not Found</h1>
            <p>The page you're looking for has wandered off. It might have been moved, deleted, or maybe it never existed in this dimension.</p>
            
            <div class="actions">
                <a href="/" class="btn btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    Back to Home
                </a>
                <a href="/search.html" class="btn btn-secondary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    Search Articles
                </a>
            </div>
            
            <div class="search-form">
                <p>Or find what you're looking for</p>
                <form class="search-box" action="/search.html" method="get">
                    <input type="text" name="q" placeholder="Search articles..." aria-label="Search">
                    <button type="submit">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 Boldly Balance — Mindful living, conscious choices.</p>
    </footer>
</body>
</html>
